name: Generate PR Description

on:
  merge_group:

jobs:
  generate-description:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR description is empty
        id: check-description
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const mergeGroup = context.payload.merge_group;
              const headRef = mergeGroup.head_ref;
              
              core.info(`Merge group head_ref: ${headRef}`);
              
              // Extract PR number from the queue branch name
              // Format: refs/heads/gh-readonly-queue/main/pr-{number}-{sha}
              const match = headRef.match(/\/pr-(\d+)-/);
              if (!match) {
                core.setFailed(`Could not extract PR number from head_ref: ${headRef}`);
                return;
              }
              
              const prNumber = parseInt(match[1]);
              core.info(`Found PR #${prNumber} from merge queue branch name`);
              
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              
              const description = pr.body || '';
              if (description.trim().length > 0) {
                core.info(`PR #${prNumber} already has a description - skipping generation`);
                core.setFailed('PR already has description');
                return;
              }
              
              core.info(`PR #${prNumber} description is empty - will generate description`);
              core.setOutput('pr_number', prNumber);
            } catch (error) {
              core.warning(`Error checking PR: ${error.message}`);
              core.setFailed('Error checking PR status');
            }

      - name: Generate PR description with Claude
        if: steps.check-description.outcome == 'success'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Pull request #${{ steps.check-description.outputs.pr_number }} is about to be merged but has no description. Please generate a comprehensive PR description.
            
            Steps:
            1. Get the PR details:
               ```bash
               gh pr view ${{ steps.check-description.outputs.pr_number }}
               ```
            
            2. Get the diff:
               ```bash
               gh pr diff ${{ steps.check-description.outputs.pr_number }}
               ```
            
            3. Analyze the changes and create a clear, concise PR description that includes:
               - A brief summary of what this PR does
               - Key changes made (files modified, new features, bug fixes, etc.)
               - Any breaking changes (if applicable)
               - Testing considerations
               - Any other relevant information
            
            The description should be well-formatted using Markdown and should help reviewers understand the purpose and scope of the changes.
            
            After generating the description, update the PR:
            ```bash
            cat > /tmp/pr_description.md << 'EOF'
            Your description here
            EOF
            gh pr edit ${{ steps.check-description.outputs.pr_number }} --body-file /tmp/pr_description.md
            ```
          
          claude_args: '--allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr edit:*)"'
