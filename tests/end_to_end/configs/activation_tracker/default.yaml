name: default_tracker
instance:
  _target_: simplexity.activations.activation_tracker.ActivationTracker
  analyses:
    pca_all_tokens:
      instance:
        _target_: simplexity.activations.activation_analyses.PcaAnalysis
        n_components: 2
        last_token_only: false
        concat_layers: false
        use_probs_as_weights: false
        skip_deduplication: true

    regression:
      instance:
        _target_: simplexity.activations.activation_analyses.LinearRegressionSVDAnalysis
        last_token_only: false
        concat_layers: true
        use_probs_as_weights: false
        skip_deduplication: true
        rcond_values: [1e-15, 1e-10, 1e-8, 1e-6, 1e-4, 1e-2]
